# Training pipeline configuration
# All symbols must be uppercase ticker strings (e.g. ETH, BNB, SOL).
# Change these values to retarget the pipeline without touching source code.

# The asset the model will trade and generate labels for.
trading_symbol: ETH

# Assets used as input signal sources for feature engineering.
# The trading_symbol is included here so its own OHLCV data becomes a feature source.
signal_symbols:
  - ETH
  - BNB
  - SOL

# OHLCV bar interval (e.g. 1h, 4h, 1d).
timeframe: 1h

# Number of bars ahead to predict.
prediction_horizon_bars: 12

# Minimum fractional return magnitude to be labelled as directional (+1 or -1).
# Returns smaller than this threshold in absolute value are labelled 0 (neutral).
return_threshold: 0.01

# Historical date range for data collection (ISO 8601, UTC implied).
start_date: "2022-01-01"
end_date: "2024-01-01"

# Chronological split fractions; must sum to 1.0.
split:
  train: 0.70
  validation: 0.15
  test: 0.15

# Baseline model to use.  Must match a key in the model registry.
model_type: RandomForestClassifier

# Hyper-parameters forwarded to the chosen model constructor.
model_params:
  n_estimators: 100
  random_state: 42
  n_jobs: -1

# Root directory for all training run artifacts.
artifacts_dir: artifacts
